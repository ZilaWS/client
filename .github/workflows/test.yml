name: Test

on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - ".editorconfig"
    branches:
      - main
      - master
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - ".editorconfig"
    branches:
      - main
      - master

# zilaws-client and zilaws-server depend on each other in tests. Check out both
# repositories side by side and link the freshly built server into the client so
# tests do not run against an older published zilaws-server package.
jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

    steps:
      - name: Checkout client
        uses: actions/checkout@v4
        with:
          path: client

      - name: Checkout server (cross-dependency)
        uses: actions/checkout@v4
        with:
          repository: ZilaWS/server
          path: server

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        working-directory: server
        run: bun install

      - name: Install client dependencies
        working-directory: client
        run: bun install

      - name: Register server bun link
        working-directory: server
        run: bun link

      - name: Build zilaws-server
        working-directory: server
        run: bun run build:cjs && bun run build:esm && bun run build:types

      - name: Link zilaws-server into client
        working-directory: client
        run: bun link zilaws-server

      - name: Build zilaws-client
        working-directory: client
        run: bun run build:cjs && bun run build:esm && bun run build:types

      # Puppeteer's bundled Chrome + the system libraries it needs to launch
      # headless on the runner (used by the client browser tests).
      - name: Install Chrome for Puppeteer
        working-directory: client
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2 libpango-1.0-0 libcairo2 libatspi2.0-0
          rm -rf "$PUPPETEER_CACHE_DIR/chrome"
          bunx puppeteer browsers install chrome

      - name: Run client tests (bun)
        working-directory: client
        run: bun run test:bun:all
